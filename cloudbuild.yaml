steps:
# 1. Build the Docker image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/mlops-repo/mlops-experiment:latest', '.']

# 2. Push to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/mlops-repo/mlops-experiment:latest']

# 3. Deploy to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'mlops-service'
  - '--image'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/mlops-repo/mlops-experiment:latest'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

images:
- 'us-central1-docker.pkg.dev/$PROJECT_ID/mlops-repo/mlops-experiment:latest'
