name: MLOps CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
        # This checks if your code even has the right libraries
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn pandas joblib

    - name: Run Syntax Check
      run: |
        # This catches "dumb" errors before they reach the cloud
        python -m py_compile experiment.py app.py

    - name: Build Docker Image
      run: |
        docker build -t mlops-experiment:test .
